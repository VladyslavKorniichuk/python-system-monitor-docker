services:
  api-monitor:
    build: .
    container_name: python-sys-monitor
    ports:
      - "8000:8000" 
    restart: unless-stopped
    
    # Resource limits and reservations
    deploy:
      resources:
        limits:
          cpus: '0.5'       
          memory: 256M      
        reservations:
          cpus: '0.1'       
          memory: 64M       
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"      
        max-file: "3"
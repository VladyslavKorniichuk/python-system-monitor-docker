services:
  api-monitor:
    build: .
    container_name: python-sys-monitor
    ports:
      - "8000:8000" 
    restart: unless-stopped

    # Environment variables for the application
    environment:
      - PORT=8000
      - PYTHONUNBUFFERED=1
    
    # Resource limits and reservations
    deploy:
      resources:
        limits:
          cpus: '0.5'       
          memory: 256M      
        reservations:
          cpus: '0.1'       
          memory: 64M       
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"      
        max-file: "3"

  # Watchtower service for automatic updates
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60 python-sys-monitor